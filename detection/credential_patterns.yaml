# Credential and Secret Detection Patterns
# ==========================================

patterns:
  API_KEY:
    description: "Generic API Key"
    patterns:
      - regex: '\b(?:api[_\-]?key|apikey)[\s=:"'']*([A-Za-z0-9_\-]{20,64})\b'
        score: 0.85
      - regex: '\b(?:x-api-key|authorization)[\s=:"'']*(?:Bearer\s+)?([A-Za-z0-9_\-\.]{20,})\b'
        score: 0.8
    context_words:
      - "api key"
      - "api_key"
      - "authorization"
      - "token"

  AWS_CREDENTIALS:
    description: "AWS Access Key or Secret"
    patterns:
      - regex: '\b(AKIA[0-9A-Z]{16})\b'
        score: 0.95
      - regex: '\b(?:aws_secret_access_key|aws_secret)[\s=:"'']*([A-Za-z0-9/+=]{40})\b'
        score: 0.9
    context_words:
      - "aws"
      - "access key"
      - "secret key"
      - "credentials"

  PASSWORD:
    description: "Password in plain text"
    patterns:
      - regex: '\b(?:password|passwd|pwd)[\s=:"'']+([^\s"'']{4,})\b'
        score: 0.85
      - regex: '\b(?:pass|secret)[\s=:"'']+([^\s"'']{8,})\b'
        score: 0.7
    context_words:
      - "password"
      - "passwd"
      - "credential"
      - "secret"

  JWT_TOKEN:
    description: "JSON Web Token"
    patterns:
      - regex: '\b(eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+)\b'
        score: 0.95
    context_words:
      - "jwt"
      - "token"
      - "bearer"
      - "authorization"

  PRIVATE_KEY:
    description: "Private Key (PEM format)"
    patterns:
      - regex: '-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----'
        score: 0.99
    context_words:
      - "private key"
      - "ssh"
      - "certificate"
      - "pem"

  DATABASE_URL:
    description: "Database Connection String"
    patterns:
      - regex: '\b(?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?|redis)://[^\s"'']+\b'
        score: 0.9
      - regex: '\b(?:DATABASE_URL|DB_URL|CONN_STRING)[\s=:"'']+([^\s"'']+)\b'
        score: 0.85
    context_words:
      - "database"
      - "connection string"
      - "db url"
      - "connection"
