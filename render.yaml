# Render.com Deployment Configuration
# Deploy the Healthcare Privacy Firewall as a web service

services:
  # ──── FastAPI Gateway ────
  - type: web
    name: healthcare-firewall-gateway
    runtime: docker
    dockerfilePath: docker/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: firewall-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: firewall-redis
          type: redis
          property: connectionURI
      - key: GATEWAY_HOST
        value: 0.0.0.0
      - key: GATEWAY_PORT
        value: 8000
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: HIPAA_MODE
        value: true
      - key: SLACK_WEBHOOK_URL
        sync: false
    healthCheckPath: /health
    plan: starter

  # ──── Redis ────
  - type: redis
    name: firewall-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ──── PostgreSQL ────
  - name: firewall-db
    plan: starter
    databaseName: healthcare_firewall
    user: firewall_user
